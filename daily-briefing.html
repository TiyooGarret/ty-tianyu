});

// Render content
const content = document.getElementById('content');
briefings.forEach(b => {
  let html = `<div class="day-section" id="day-${b.date}">
    <div class="day-header">
      <span class="date">${b.date}</span>
      <span class="weekday">${b.weekday}</span>
    </div>`;

  // Trends first
  if (b.trends) {
    html += `<div class="trend-box"><h3>📊 趋势摘要</h3><ul>`;
    b.trends.forEach(t => { html += `<li>${t}</li>`; });
    html += `</ul></div>`;
  }

  b.posts.forEach((p, i) => {
    const tagClass = 'tag-' + p.tag;
    html += `<div class="post">
      <div class="post-header">
        <span class="post-number">${i + 1}</span>
        <span class="post-title">${p.title}<span class="post-tag ${tagClass}">${p.tagText}</span></span>
      </div>
      <div class="post-body">${p.body}</div>
      ${p.link !== '#' ? `<div class="post-link"><a href="${p.link}" target="_blank">查看原帖 →</a></div>` : ''}
    </div>`;
  });

  html += `</div>`;
  content.innerHTML += html;
});

// Scroll spy for nav
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll('.nav-tabs a').forEach(a => a.classList.remove('active'));
      const id = entry.target.id;
      const activeLink = document.querySelector(`.nav-tabs a[href="#${id}"]`);
      if (activeLink) activeLink.classList.add('active');
    }
  });
}, { threshold: 0.3 });
document.querySelectorAll('.day-section').forEach(s => observer.observe(s));
